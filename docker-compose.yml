version: '3.8'

services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_GPU=2
      - OLLAMA_NUM_PARALLEL=1
      - CUDA_VISIBLE_DEVICES=0,1

  vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    container_name: vllm-server
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    environment:
      - CUDA_VISIBLE_DEVICES=0,1
      - TENSOR_PARALLEL_SIZE=2
    command: [
      "--model", "/models/model-name",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--tensor-parallel-size", "2",
      "--gpu-memory-utilization", "0.95",
      "--max-model-len", "8192"
    ]

volumes:
  ollama_data: